name: Plu-Stan Release

on:
  # Trigger the workflow on the new 'v*' tag created
  push:
    tags:
      - "v*"

jobs:
  create_release:
    name: Create Github Release
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Create Release
        run: gh release create ${{ github.ref_name }} --draft --title "Release ${{ github.ref_name }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build_plustan_canonical:
    needs: [create_release]
    name: plustan / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            binary: plustan
            ext: ""
          - os: macos-latest
            target: darwin-arm64
            binary: plustan
            ext: ""
          - os: macos-13
            target: darwin-x64
            binary: plustan
            ext: ""
          - os: windows-latest
            target: windows-x64
            binary: plustan.exe
            ext: ".exe"

    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Set tag name
        uses: olegtarasov/get-tag@v2.1.3
        id: tag
        with:
          tagRegex: "v(.*)"
          tagRegexGroup: 1

      - name: Setup Haskell
        uses: haskell-actions/setup@v2
        id: setup-haskell-cabal
        with:
          ghc-version: "9.6.6"
          cabal-version: "3.12"

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y libsodium-dev libsecp256k1-dev pkg-config
          git clone --depth 1 https://github.com/supranational/blst.git /tmp/blst
          cd /tmp/blst && ./build.sh
          sudo install -m 644 bindings/blst.h bindings/blst_aux.h /usr/local/include/
          sudo install -m 644 libblst.a /usr/local/lib/
          sudo mkdir -p /usr/local/lib/pkgconfig
          printf 'Name: blst\nVersion: 0.3\nDescription: BLS12-381 signature library\nLibs: -L/usr/local/lib -lblst\nCflags: -I/usr/local/include\n' | sudo tee /usr/local/lib/pkgconfig/blst.pc
          echo "PKG_CONFIG_PATH=/usr/local/lib/pkgconfig${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}" >> "$GITHUB_ENV"

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install libsodium secp256k1 blst

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          C:\msys64\usr\bin\bash -lc "pacman -S --noconfirm mingw-w64-x86_64-libsodium mingw-w64-x86_64-secp256k1 mingw-w64-x86_64-blst mingw-w64-x86_64-pkg-config"
          echo "PKG_CONFIG_PATH=C:\msys64\mingw64\lib\pkgconfig" >> $env:GITHUB_ENV

      - name: Freeze
        run: cabal freeze

      - name: Cache ~/.cabal/store
        uses: actions/cache@v4
        with:
          path: ${{ steps.setup-haskell-cabal.outputs.cabal-store }}
          key: ${{ runner.os }}-${{ matrix.target }}-9.6.6-plustan-${{ hashFiles('cabal.project.freeze') }}

      - name: Build plustan binary
        run: |
          mkdir dist
          cabal install exe:plustan --install-method=copy --overwrite-policy=always --installdir=dist

      - name: Upload plustan canonical asset
        run: |
          cp "./dist/${{ matrix.binary }}" "./dist/plustan-${{ steps.tag.outputs.tag }}-${{ matrix.target }}${{ matrix.ext }}"
          gh release upload ${{ github.ref_name }} "./dist/plustan-${{ steps.tag.outputs.tag }}-${{ matrix.target }}${{ matrix.ext }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
