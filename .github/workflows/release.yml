# Note [environment variables]
#
# It seems absurd, but the syntax for creating environment variables
# differs between Windows and Linux/MacOS.  See
#
# https://docs.github.com/en/actions/learn-github-actions/variables
#
# In Linux/MacOS we have to use
#
# run: echo "VARNAME=content" >> "$GITHUB_ENV"
#
# whereas in Windows we have to use
#
# run: echo "VARNAME=content" >> $env:GITHUB_ENV

name: Stan Release

on:
  # Trigger the workflow on the new 'v*' tag created
  push:
    tags:
      - "v*"

jobs:
  create_release:
    name: Create Github Release
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Create Release
        run: gh release create ${{ github.ref_name }} --draft --title "Release ${{ github.ref_name }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build_artifact:
    needs: [create_release]
    name: ${{ matrix.os }}/GHC ${{ matrix.ghc }}/${{ github.ref }}
    runs-on: ${{ matrix.os }}
    strategy:
      # Don't fail fast because we test a lot of versions and it's
      # good to know which ones work and which ones don't
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macOS-latest, windows-latest]
        ghc:
          - "8.8.4"
          - "8.10.7"
          - "9.0.2"
          - "9.2.3"
          - "9.4.7"
          - "9.6.3"
        cabal: ["3.8"]

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set tag name
        uses: olegtarasov/get-tag@v2.1.3
        id: tag
        with:
          tagRegex: "v(.*)"
          tagRegexGroup: 1

      - name: Setup Haskell
        uses: haskell/actions/setup@v2.4.7
        id: setup-haskell-cabal
        with:
          ghc-version: ${{ matrix.ghc }}
          cabal-version: ${{ matrix.cabal }}

      - name: Freeze
        run: |
          cabal freeze

      - name: Cache ~/.cabal/store
        uses: actions/cache@v4
        with:
          path: ${{ steps.setup-haskell-cabal.outputs.cabal-store }}
          key: ${{ runner.os }}-${{ matrix.ghc }}-${{ hashFiles('cabal.project.freeze') }}

      - name: Build binary
        run: |
          mkdir dist
          cabal install exe:stan --install-method=copy --overwrite-policy=always --installdir=dist

      # See Note [environment variables]
      - if: matrix.os == 'windows-latest'
        name: Set binary path name on Windows
        run: echo "BINARY_PATH=./dist/stan.exe" >> $env:GITHUB_ENV

      # See Note [environment variables]
      - if: matrix.os != 'windows-latest'
        name: Set binary path name not on Windows
        run: echo "BINARY_PATH=./dist/stan" >> "$GITHUB_ENV"

      - name: Compress binary
        uses: svenstaro/upx-action@v2.4.1
        with:
          file: ${{ env.BINARY_PATH }}

      # See Note [environment variables]
      - if: matrix.os == 'windows-latest'
        name: Copy binary to unique asset name on Windows
        run: |
          Copy-Item "${{ env.BINARY_PATH }}" "./dist/stan-${{ steps.tag.outputs.tag }}-${{ runner.os }}-ghc-${{ matrix.ghc }}.exe"
          echo "ASSET_PATH=./dist/stan-${{ steps.tag.outputs.tag }}-${{ runner.os }}-ghc-${{ matrix.ghc }}.exe" >> $env:GITHUB_ENV

      # See Note [environment variables]
      - if: matrix.os != 'windows-latest'
        name: Copy binary to unique asset name not on Windows
        run: |
          cp "${{ env.BINARY_PATH }}" "./dist/stan-${{ steps.tag.outputs.tag }}-${{ runner.os }}-ghc-${{ matrix.ghc }}"
          echo "ASSET_PATH=./dist/stan-${{ steps.tag.outputs.tag }}-${{ runner.os }}-ghc-${{ matrix.ghc }}" >> "$GITHUB_ENV"

      - name: Upload Release Asset
        run: gh release upload ${{ github.ref_name }} "${{ env.ASSET_PATH }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build_plustan_canonical:
    needs: [create_release]
    name: plustan / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            binary: plustan
            ext: ""
          - os: macos-latest
            target: darwin-arm64
            binary: plustan
            ext: ""
          - os: macos-13
            target: darwin-x64
            binary: plustan
            ext: ""
          - os: windows-latest
            target: windows-x64
            binary: plustan.exe
            ext: ".exe"

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set tag name
        uses: olegtarasov/get-tag@v2.1.3
        id: tag
        with:
          tagRegex: "v(.*)"
          tagRegexGroup: 1

      - name: Setup Haskell
        uses: haskell/actions/setup@v2.4.7
        id: setup-haskell-cabal
        with:
          ghc-version: "9.6.7"
          cabal-version: "3.12"

      - name: Freeze
        run: cabal freeze

      - name: Cache ~/.cabal/store
        uses: actions/cache@v4
        with:
          path: ${{ steps.setup-haskell-cabal.outputs.cabal-store }}
          key: ${{ runner.os }}-9.6.7-plustan-${{ hashFiles('cabal.project.freeze') }}

      - name: Build plustan binary
        run: |
          mkdir dist
          cabal install exe:plustan --install-method=copy --overwrite-policy=always --installdir=dist

      - name: Upload plustan canonical asset
        run: |
          cp "./dist/${{ matrix.binary }}" "./dist/plustan-${{ steps.tag.outputs.tag }}-${{ matrix.target }}${{ matrix.ext }}"
          gh release upload ${{ github.ref_name }} "./dist/plustan-${{ steps.tag.outputs.tag }}-${{ matrix.target }}${{ matrix.ext }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
